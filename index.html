<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Professores — Skills & GO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #F5C842;
    --accent2: #FF6B35;
    --text: #f0f0f0;
    --muted: #888;
    --muted2: #555;
    --ativo: #22c55e;
    --inativo: #6b7280;
    --prospecto: #f59e0b;
    --radius: 12px;
    --radius-lg: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }
  .header-tag {
    font-size: 11px;
    background: rgba(245,200,66,0.12);
    color: var(--accent);
    border: 1px solid rgba(245,200,66,0.2);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
  }

  /* HERO STRIP */
  .hero-strip {
    margin-bottom: 2.5rem;
  }
  .hero-strip h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1.05;
  }
  .hero-strip h1 em {
    font-style: normal;
    color: var(--accent);
  }
  .hero-strip p {
    margin-top: 6px;
    color: var(--muted);
    font-size: 14px;
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--border-hover); }
  .stat-n {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    font-weight: 400;
    letter-spacing: 1px;
    line-height: 1.05;
  }
  .stat-l {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .n-total { color: var(--accent); }
  .n-ativo { color: var(--ativo); }
  .n-prospecto { color: var(--prospecto); }
  .n-inativo { color: var(--inativo); }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  .toolbar input, .toolbar select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .search-wrap input { padding-left: 38px; }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
  .toolbar select { min-width: 160px; flex: none; cursor: pointer; }
  select option { background: #1a1a1a; }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 10px 18px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--border-hover); background: var(--surface2); }
  .btn.primary {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { background: #e6b832; }
  .btn.sm { padding: 6px 12px; font-size: 12px; }
  .btn.danger { border-color: rgba(239,68,68,0.3); color: #ef4444; }
  .btn.danger:hover { background: rgba(239,68,68,0.08); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead tr {
    border-bottom: 1px solid var(--border);
  }
  th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--text); }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 10px; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td {
    padding: 14px 16px;
    font-size: 13px;
    vertical-align: middle;
  }

  /* AVATAR */
  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .cell-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .name-main { font-weight: 500; color: var(--text); }
  .name-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* BADGES */
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-ativo { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
  .badge-inativo { background: rgba(107,114,128,0.15); color: #9ca3af; border: 1px solid rgba(107,114,128,0.2); }
  .badge-prospecto { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
  .badge-area { background: rgba(245,200,66,0.1); color: var(--accent); border: 1px solid rgba(245,200,66,0.15); margin: 2px 2px 2px 0; }
  .badge-pj { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); }
  .badge-rpa { background: rgba(20,184,166,0.12); color: #5eead4; border: 1px solid rgba(20,184,166,0.2); }

  /* ACTIONS COL */
  .actions { display: flex; gap: 6px; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.3;
  }
  .empty h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: var(--radius-lg);
    padding: 2rem;
    width: 100%;
    max-width: 580px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .modal-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .modal-header h2 span { color: var(--accent); }
  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 4px;
    transition: color 0.15s;
  }
  .close-btn:hover { color: var(--text); }
  .form-section {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin: 1.2rem 0 0.8rem;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(245,200,66,0.15);
  }
  .form-section:first-of-type { margin-top: 0; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .form-row { display: flex; flex-direction: column; gap: 5px; }
  .form-row.span2 { grid-column: 1 / -1; }
  .form-row label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .form-row input,
  .form-row select,
  .form-row textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus { border-color: var(--accent); }
  .form-row textarea { min-height: 70px; resize: vertical; }
  select option { background: #1a1a1a; }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  /* DRAWER */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 150;
    backdrop-filter: blur(2px);
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed;
    right: -480px;
    top: 0;
    bottom: 0;
    width: 480px;
    background: var(--surface);
    border-left: 1px solid var(--border-hover);
    z-index: 160;
    overflow-y: auto;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    padding: 2rem;
  }
  .drawer.open { right: 0; }
  .drawer-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .drawer-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 10px;
  }
  .drawer-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .drawer-prof {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
  }
  .drawer-section {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted2);
    margin: 1.5rem 0 0.8rem;
  }
  .drawer-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    gap: 16px;
  }
  .drawer-row:last-child { border-bottom: none; }
  .drawer-label { color: var(--muted); min-width: 110px; }
  .drawer-value { color: var(--text); text-align: right; word-break: break-word; }
  .drawer-value a { color: var(--accent); text-decoration: none; }
  .drawer-value a:hover { text-decoration: underline; }
  .drawer-obs {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 4px;
  }
  .drawer-actions {
    display: flex;
    gap: 8px;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  /* PAGINATION */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .page-btns { display: flex; gap: 4px; }
  .page-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .page-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .page-btn.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight: 700; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .drawer { width: 100%; right: -100%; }
    header { padding: 0 1rem; }
    main { padding: 1.5rem 1rem; }
    .hero-strip h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-text">Skills & <span>GO</span></div>
  </div>
  <div class="header-tag">Banco de Professores</div>
</header>

<main>
  <div class="hero-strip">
    <h1>Professores <em>&</em> Especialistas</h1>
    <p>Gerencie o time de professores do Skills & GO em um só lugar.</p>
  </div>

  <div class="stats" id="stats"></div>

  <div id="loading" style="text-align:center;padding:3rem;color:var(--muted);font-size:14px;letter-spacing:0.5px;">
    Conectando ao banco de dados...
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Buscar por nome, e-mail, área...">
    </div>
    <select id="fStatus">
      <option value="">Todos os status</option>
      <option>Ativo</option>
      <option>Inativo</option>
      <option>Prospecto</option>
    </select>
    <select id="fContrato">
      <option value="">Todos os contratos</option>
      <option>PJ</option>
      <option>RPA</option>
    </select>
    <button class="btn primary" onclick="openModal()">+ Novo professor</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('nome')">Professor <span class="sort-arrow" id="s-nome"></span></th>
          <th onclick="sortBy('areas')">Áreas</th>
          <th onclick="sortBy('nivel')">Nível</th>
          <th onclick="sortBy('contrato')">Contrato</th>
          <th onclick="sortBy('disp')">Disponibilidade</th>
          <th onclick="sortBy('status')">Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="pagination" class="pagination" style="display:none"></div>
  </div>
</main>

<!-- MODAL FORM -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Novo <span>professor</span></h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>

    <div class="form-section">Identificação</div>
    <div class="form-grid">
      <div class="form-row span2"><label>Nome completo *</label><input id="f-nome" type="text" placeholder="Ex: Ana Paula Souza"></div>
      <div class="form-row"><label>E-mail pessoal</label><input id="f-email1" type="email" placeholder="ana@gmail.com"></div>
      <div class="form-row"><label>E-mail institucional</label><input id="f-email2" type="email" placeholder="ana@alura.com.br"></div>
      <div class="form-row"><label>Telefone / WhatsApp</label><input id="f-tel" type="text" placeholder="(11) 9 0000-0000"></div>
      <div class="form-row"><label>LinkedIn</label><input id="f-linkedin" type="text" placeholder="linkedin.com/in/..."></div>
    </div>

    <div class="form-section">Perfil profissional</div>
    <div class="form-grid">
      <div class="form-row span2"><label>Profissão / Cargo atual</label><input id="f-prof" type="text" placeholder="Ex: Engenheiro de ML Sênior"></div>
      <div class="form-row"><label>Nível acadêmico</label>
        <select id="f-nivel">
          <option value="">Selecione</option>
          <option>Graduação</option>
          <option>Especialização</option>
          <option>MBA</option>
          <option>Mestrado</option>
          <option>Doutorado</option>
          <option>Pós-doutorado</option>
        </select>
      </div>
      <div class="form-row"><label>Empresa / Instituição</label><input id="f-empresa" type="text" placeholder="Ex: Google, Nubank..."></div>
      <div class="form-row span2"><label>Áreas de atuação / disciplinas</label><input id="f-areas" type="text" placeholder="Ex: Python, IA Generativa, SQL, BI (separe por vírgula)"></div>
    </div>

    <div class="form-section">Contratação</div>
    <div class="form-grid">
      <div class="form-row"><label>Tipo de contrato</label>
        <select id="f-contrato">
          <option value="">Selecione</option>
          <option>PJ</option>
          <option>RPA</option>
        </select>
      </div>
      <div class="form-row"><label>Valor hora/aula (R$)</label><input id="f-valor" type="number" placeholder="0"></div>
      <div class="form-row"><label>Disponibilidade</label>
        <select id="f-disp">
          <option value="">Selecione</option>
          <option>Manhã</option>
          <option>Tarde</option>
          <option>Noite</option>
          <option>Fins de semana</option>
          <option>Flexível</option>
        </select>
      </div>
      <div class="form-row"><label>Status</label>
        <select id="f-status">
          <option value="">Selecione</option>
          <option>Ativo</option>
          <option>Inativo</option>
          <option>Prospecto</option>
        </select>
      </div>
    </div>

    <div class="form-section">Observações</div>
    <div class="form-grid full">
      <div class="form-row"><label>Notas internas</label><textarea id="f-obs" placeholder="Histórico, contexto, referências..."></textarea></div>
    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" onclick="salvar()">Salvar professor</button>
    </div>
  </div>
</div>

<!-- DRAWER DETAIL -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div id="drawerContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAD45Pvl9t1LeSKBj__0LYJv44uvD7Ho9Q",
  authDomain: "skillsgo-professores.firebaseapp.com",
  projectId: "skillsgo-professores",
  storageBucket: "skillsgo-professores.firebasestorage.app",
  messagingSenderId: "559072068957",
  appId: "1:559072068957:web:33e349970d4a7febb1d4b4"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const col = collection(db, 'professores');

const COLORS = [
  ['#1a1a2e','#a78bfa'],['#1a2e1a','#4ade80'],['#2e1a1a','#f87171'],
  ['#2e2a1a','#fbbf24'],['#1a2a2e','#38bdf8'],['#2e1a2e','#e879f9'],
];
function initials(n){return (n||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('')}
function colorFor(n){const i=(n||'').charCodeAt(0)%COLORS.length;return COLORS[i]}

let lista = [];       // array local sincronizado com Firestore
let editId = null;    // id do doc sendo editado
let sortCol = 'nome';
let sortAsc = true;
let page = 1;
const PER_PAGE = 12;

// ── loading overlay ──────────────────────────────────────────────
const loadEl = document.getElementById('loading');

// ── escuta em tempo real ─────────────────────────────────────────
onSnapshot(col, snap => {
  lista = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
  if(loadEl) loadEl.style.display = 'none';
  render();
});

// ── stats ────────────────────────────────────────────────────────
function renderStats(){
  const at=lista.filter(p=>p.status==='Ativo').length;
  const in_=lista.filter(p=>p.status==='Inativo').length;
  const pr=lista.filter(p=>p.status==='Prospecto').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-n n-total">${lista.length}</div><div class="stat-l">Total</div></div>
    <div class="stat-card"><div class="stat-n n-ativo">${at}</div><div class="stat-l">Ativos</div></div>
    <div class="stat-card"><div class="stat-n n-prospecto">${pr}</div><div class="stat-l">Prospectos</div></div>
    <div class="stat-card"><div class="stat-n n-inativo">${in_}</div><div class="stat-l">Inativos</div></div>
  `;
}

// ── filtro + ordenação ───────────────────────────────────────────
function filtered(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const fs=document.getElementById('fStatus').value;
  const fc=document.getElementById('fContrato').value;
  return lista.filter(p=>{
    const m=!q||(p.nome||'').toLowerCase().includes(q)||(p.email1||'').toLowerCase().includes(q)||(p.email2||'').toLowerCase().includes(q)||(p.areas||'').toLowerCase().includes(q)||(p.prof||'').toLowerCase().includes(q);
    return m&&(!fs||p.status===fs)&&(!fc||p.contrato===fc);
  }).sort((a,b)=>{
    const av=(a[sortCol]||'').toLowerCase();
    const bv=(b[sortCol]||'').toLowerCase();
    return sortAsc?(av>bv?1:-1):(av<bv?1:-1);
  });
}

// ── render tabela ────────────────────────────────────────────────
function render(){
  renderStats();
  const list=filtered();
  const total=list.length;
  const pages=Math.ceil(total/PER_PAGE)||1;
  if(page>pages)page=1;
  const slice=list.slice((page-1)*PER_PAGE,page*PER_PAGE);

  ['nome','areas','nivel','contrato','disp','status'].forEach(k=>{
    const el=document.getElementById('s-'+k);
    if(el)el.textContent=sortCol===k?(sortAsc?'↑':'↓'):'';
  });

  const tbody=document.getElementById('tbody');
  if(!slice.length){
    tbody.innerHTML=`<tr><td colspan="7"><div class="empty"><div class="empty-icon">◎</div><h3>Nenhum professor encontrado</h3><p>Adicione professores ou ajuste os filtros.</p></div></td></tr>`;
  } else {
    tbody.innerHTML=slice.map(p=>{
      const id=p._id;
      const [bg,fg]=colorFor(p.nome||'?');
      const ini=initials(p.nome||'?');
      const sc=(p.status||'').toLowerCase();
      const areas=(p.areas||'').split(',').filter(Boolean).slice(0,2).map(a=>`<span class="badge badge-area">${a.trim()}</span>`).join(' ');
      const cc=p.contrato==='PJ'?'pj':p.contrato==='RPA'?'rpa':'';
      return `<tr onclick="openDrawer('${id}')">
        <td><div class="cell-name">
          <div class="avatar" style="background:${bg};color:${fg}">${ini}</div>
          <div><div class="name-main">${p.nome||'—'}</div><div class="name-sub">${p.email1||p.email2||''}</div></div>
        </div></td>
        <td>${areas||'<span style="color:var(--muted2)">—</span>'}</td>
        <td><span style="font-size:12px;color:var(--muted)">${p.nivel||'—'}</span></td>
        <td>${cc?`<span class="badge badge-${cc}">${p.contrato}</span>`:'<span style="color:var(--muted2)">—</span>'}</td>
        <td><span style="font-size:12px;color:var(--muted)">${p.disp||'—'}</span></td>
        <td>${sc?`<span class="badge badge-${sc}">${p.status}</span>`:'—'}</td>
        <td onclick="event.stopPropagation()"><div class="actions">
          <button class="btn sm" onclick="openModal('${id}')">Editar</button>
          <button class="btn sm danger" onclick="excluir('${id}')">✕</button>
        </div></td>
      </tr>`;
    }).join('');
  }

  const pg=document.getElementById('pagination');
  if(total>PER_PAGE){
    pg.style.display='flex';
    let btns='';
    for(let i=1;i<=pages;i++) btns+=`<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
    pg.innerHTML=`<span>Mostrando ${Math.min((page-1)*PER_PAGE+1,total)}–${Math.min(page*PER_PAGE,total)} de ${total}</span><div class="page-btns">${btns}</div>`;
  } else {
    pg.style.display='none';
  }
}

window.goPage  = n=>{page=n;render();};
window.sortBy  = col=>{if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}render();};

// ── modal ────────────────────────────────────────────────────────
window.openModal = function(id=null){
  editId = id;
  const p = id ? lista.find(x=>x._id===id)||{} : {};
  document.getElementById('modal-title').innerHTML = id ? 'Editar <span>professor</span>' : 'Novo <span>professor</span>';
  ['nome','email1','email2','tel','linkedin','prof','nivel','empresa','areas','contrato','valor','disp','status','obs'].forEach(k=>{
    const el=document.getElementById('f-'+k);
    if(el) el.value=p[k]||'';
  });
  document.getElementById('overlay').classList.add('open');
};
window.closeModal = ()=>document.getElementById('overlay').classList.remove('open');

window.salvar = async function(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){alert('Nome é obrigatório.');return;}
  const p={};
  ['nome','email1','email2','tel','linkedin','prof','nivel','empresa','areas','contrato','valor','disp','status','obs'].forEach(k=>{
    p[k]=(document.getElementById('f-'+k).value||'').trim();
  });
  const btn = document.querySelector('#overlay .btn.primary');
  btn.textContent='Salvando...'; btn.disabled=true;
  try {
    if(editId){ await updateDoc(doc(db,'professores',editId), p); }
    else       { await addDoc(col, p); }
    closeModal();
  } catch(e){ alert('Erro ao salvar: '+e.message); }
  btn.textContent='Salvar professor'; btn.disabled=false;
};

window.excluir = async function(id){
  if(!confirm('Remover este professor do banco?')) return;
  closeDrawer();
  await deleteDoc(doc(db,'professores',id));
};

// ── drawer detalhe ───────────────────────────────────────────────
window.openDrawer = function(id){
  const p=lista.find(x=>x._id===id);
  if(!p) return;
  const [bg,fg]=colorFor(p.nome||'?');
  const ini=initials(p.nome||'?');
  const sc=(p.status||'').toLowerCase();
  const cc=p.contrato==='PJ'?'pj':p.contrato==='RPA'?'rpa':'';
  const areas=(p.areas||'').split(',').filter(Boolean).map(a=>`<span class="badge badge-area" style="font-size:12px">${a.trim()}</span>`).join(' ');

  function row(l,v){ if(!v)return ''; return `<div class="drawer-row"><span class="drawer-label">${l}</span><span class="drawer-value">${v}</span></div>`; }

  document.getElementById('drawerContent').innerHTML=`
    <div class="drawer-top"><div></div><button class="close-btn" onclick="closeDrawer()">✕</button></div>
    <div class="drawer-avatar" style="background:${bg};color:${fg}">${ini}</div>
    <div class="drawer-name">${p.nome||'—'}</div>
    <div class="drawer-prof">${p.prof||''}${p.empresa?` · ${p.empresa}`:''}</div>
    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
      ${sc?`<span class="badge badge-${sc}">${p.status}</span>`:''}
      ${cc?`<span class="badge badge-${cc}">${p.contrato}</span>`:''}
      ${p.nivel?`<span class="badge" style="background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid var(--border)">${p.nivel}</span>`:''}
    </div>
    <div class="drawer-section">Contato</div>
    ${row('E-mail pessoal',p.email1)}
    ${row('E-mail institucional',p.email2)}
    ${row('Telefone',p.tel)}
    ${p.linkedin?`<div class="drawer-row"><span class="drawer-label">LinkedIn</span><span class="drawer-value"><a href="https://${p.linkedin.replace('https://','')}" target="_blank">${p.linkedin}</a></span></div>`:''}
    <div class="drawer-section">Atuação</div>
    ${areas?`<div style="padding:8px 0;border-bottom:1px solid var(--border)">${areas}</div>`:''}
    ${row('Disponibilidade',p.disp)}
    ${p.valor?`<div class="drawer-row"><span class="drawer-label">Hora/aula</span><span class="drawer-value">R$ ${Number(p.valor).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>`:''}
    ${p.obs?`<div class="drawer-section">Observações</div><div class="drawer-obs">${p.obs}</div>`:''}
    <div class="drawer-actions">
      <button class="btn" style="flex:1" onclick="closeDrawer();openModal('${id}')">Editar</button>
      <button class="btn danger" onclick="excluir('${id}')">Remover</button>
    </div>
  `;
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
};
window.closeDrawer = ()=>{
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
};

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});
document.getElementById('search').addEventListener('input',render);
document.getElementById('fStatus').addEventListener('change',render);
document.getElementById('fContrato').addEventListener('change',render);
</script>
</body>
</html>
